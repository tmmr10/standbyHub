name: standby_hub
description: "StandBy Hub — Beautiful StandBy Widgets for iOS"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  json_annotation: ^4.9.0
  in_app_purchase: ^3.2.0
  go_router: ^15.1.2
  flex_color_picker: ^3.6.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#0D1117"
  image: assets/splash_icon.png
  ios: true
  android: false

flutter:
  uses-material-design: true
  generate: true
